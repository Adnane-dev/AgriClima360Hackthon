classification:
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    scale_pos_weight: "balanced"
    
  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5

clustering:
  kmeans:
    n_clusters: [3, 4, 5, 6, 7, 8]
    init: "k-means++"
    
  dbscan:
    eps: 0.3
    min_samples: 5

regression:
  xgboost:
    n_estimators: 300
    max_depth: 7
    learning_rate: 0.03
    
  lstm:
    epochs: 100
    batch_size: 32
    hidden_layers: [64, 32]